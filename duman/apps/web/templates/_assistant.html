<div id="hc-assistant" class="assistant-widget" aria-live="polite">
  <button id="hc-toggle" aria-label="Open the HappyCake assistant" aria-expanded="false" aria-controls="hc-panel" type="button">Chat with us</button>
  <div id="hc-panel" role="dialog" aria-modal="false" aria-labelledby="hc-title" hidden>
    <header>
      <strong id="hc-title">HappyCake</strong>
      <span>Ask about cakes, allergens, or your order.</span>
      <button id="hc-close" aria-label="Close chat" type="button">×</button>
    </header>
    <div id="hc-log" role="log" aria-live="polite"></div>
    <form id="hc-form">
      <input id="hc-input" type="text" autocomplete="off"
             aria-label="Message HappyCake"
             aria-describedby="hc-hint"
             placeholder='e.g. cake "Honey" for 8 people Saturday' required>
      <button type="submit">Send</button>
    </form>
    <p id="hc-hint" class="hint">Replies are written by HappyCake's assistant. Anything about
       allergens or special requests is reviewed by a human before we commit.</p>
  </div>
</div>
<script>
(function () {
  const toggle = document.getElementById('hc-toggle');
  const panel = document.getElementById('hc-panel');
  const close = document.getElementById('hc-close');
  const form = document.getElementById('hc-form');
  const input = document.getElementById('hc-input');
  const log = document.getElementById('hc-log');
  const threadId = 'web_' + Math.random().toString(36).slice(2, 10);

  function append(role, text) {
    const li = document.createElement('div');
    li.className = 'msg ' + role;
    li.textContent = text;
    log.appendChild(li);
    log.scrollTop = log.scrollHeight;
  }

  function openPanel() {
    panel.hidden = false;
    toggle.hidden = true;
    toggle.setAttribute('aria-expanded', 'true');
    if (!log.dataset.greeted) {
      append('bot', 'Good morning, friends. Ask me about today’s bake, dates, allergens, or pickup.');
      log.dataset.greeted = '1';
    }
    input.focus();
  }
  function closePanel() {
    panel.hidden = true;
    toggle.hidden = false;
    toggle.setAttribute('aria-expanded', 'false');
    toggle.focus();
  }

  toggle.addEventListener('click', openPanel);
  close.addEventListener('click', closePanel);
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape' && !panel.hidden) {
      e.preventDefault();
      closePanel();
    }
  });

  form.addEventListener('submit', async (ev) => {
    ev.preventDefault();
    const text = input.value.trim();
    if (!text) return;
    append('me', text);
    input.value = '';
    append('bot', '…');
    const placeholder = log.lastChild;
    try {
      const resp = await fetch('/assistant/message', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({thread_id: threadId, text}),
      });
      const data = await resp.json();
      placeholder.textContent = data.reply_to_customer || 'I had trouble reaching the kitchen. Try again in a moment, or send a message on WhatsApp.';
      if (data.needs_owner_approval) {
        const note = document.createElement('div');
        note.className = 'msg note';
        note.textContent = 'A team member will review and reply shortly.';
        log.appendChild(note);
      }
    } catch (e) {
      placeholder.textContent = 'I had trouble reaching the kitchen. Try again in a moment, or send a message on WhatsApp.';
    }
  });
})();
</script>
