# HappyCake US — product catalog
# Single source of truth for the storefront, assistant, and agent reasoning.
# Every field is required (Pydantic-validated by src/happycake/schemas.py:Cake).
# Agent-friendliness auditor reads this via /agent/manifest, /customer/catalog,
# and as JSON-LD <script type="application/ld+json"> on each /cakes/<slug> page.

cakes:
  - slug: honey
    name: "Honey"
    short_description: 'Cake "Honey" — six layers of golden honey biscuit, soft custard between every one, walnuts pressed lightly into the top.'
    long_description: |
      Six layers of golden honey biscuit, soft custard between every one, walnuts pressed
      lightly into the top. Same recipe as the day we opened. The classic — the one most
      people come back for.
    ingredients: [flour, butter, honey, sugar, eggs, sour cream, condensed milk, walnuts, vanilla]
    allergens: [gluten, dairy, egg, tree-nut]
    halal_friendly: true
    vegan: false
    photo: /static/photos/honey.jpg
    sizes:
      # Prices align with MCP square_list_catalog and marketing_get_margin_by_product.
      - {label: slice, weight_g: 130, price_usd: 8.50, mcp_product_id: honey-cake-slice}
      - {label: whole, weight_g: 1200, price_usd: 55.00, mcp_product_id: whole-honey-cake}
    serves_min: 1
    serves_max: 10
    lead_time_hours: 4
    tier_options: [1]
    delivery_zones: [sugar-land, missouri-city, stafford, bellaire]
    available_daily: true

