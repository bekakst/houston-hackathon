# HappyCake US — operational policies
# Read by agents.care, agents.intake, /policies/* pages, and FAQPage JSON-LD.

business:
  name: "HappyCake US"
  legal_name: "Happy Cake US"
  wordmark: "HappyCake"
  address: "350 Promenade Way, Suite 500, Sugar Land, TX 77478"
  phone: "(281) 979-8320"
  website: "https://happycake.us"
  instagram_handle: "@happycake.us"

hours:
  monday: closed
  tuesday: "11:00-19:00"
  wednesday: "11:00-19:00"
  thursday: "11:00-19:00"
  friday: "11:00-19:00"
  saturday: "11:00-19:00"
  sunday: "12:00-18:00"

delivery_zones:
  - {slug: sugar-land,    name: "Sugar Land",    radius_miles: 5,  fee_usd: 6,  min_order_usd: 30}
  - {slug: missouri-city, name: "Missouri City", radius_miles: 8,  fee_usd: 8,  min_order_usd: 30}
  - {slug: stafford,      name: "Stafford",      radius_miles: 7,  fee_usd: 8,  min_order_usd: 30}
  - {slug: bellaire,      name: "Bellaire",      radius_miles: 12, fee_usd: 12, min_order_usd: 45}

pickup:
  location: "350 Promenade Way, Suite 500, Sugar Land, TX 77478"
  notice_hours: 4
  cutoff_today: "16:00"
  notes: "Pickup orders placed before 4 PM are usually ready the same day for the classics. Custom cakes need 48 hours."

allergens:
  declared:
    - gluten
    - dairy
    - egg
    - tree-nut
    - soy
    - sesame
  cross_contamination_warning: |
    Our kitchen handles flour, dairy, eggs, and tree nuts (walnut, pistachio, almond)
    daily. We cannot guarantee zero cross-contamination. For severe allergies, please
    speak with the owner before ordering — every allergen question routes to a person.
  escalation_rule: |
    Any customer message that mentions allergy, allergic, peanut, nut, gluten, dairy,
    lactose, milk-free, egg, eggless, soy, wheat, coeliac, or celiac is escalated to
    the owner before the assistant commits to an answer.

refund:
  same_day: |
    Same-day refunds for damage on delivery, wrong order, or cake quality issues.
    Photo or in-store inspection within 24 hours of receipt.
  threshold_usd: 50
  escalation_rule: "Refunds over $50 require owner approval before issue."

custom_cake:
  min_lead_time_hours: 48
  max_tiers: 3
  figurines: "Available for owner-approved designs only."
  inspiration_photos: |
    Customers can share inspiration photos. We can take inspiration from another design
    but never copy a competitor's specific work — those requests are escalated to the
    owner for redesign.

privacy:
  pii_handling: "Names, phone numbers, and addresses are stored only for fulfilment. Never sold."
